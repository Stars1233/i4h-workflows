  max_timesteps: 150
dataset:
  joint_space: raw
  state_obs_key: joint_pos
  action_names: [star_joint_1.pos, star_joint_2.pos, star_joint_3.pos, star_joint_4.pos, star_joint_5.pos, star_joint_6.pos, star_joint_7.pos, endo360_joint_1.pos]
  state_names: [star_joint_1.pos, star_joint_2.pos, star_joint_3.pos, star_joint_4.pos, star_joint_5.pos, star_joint_6.pos, star_joint_7.pos, endo360_joint_1.pos]
  state_split: [[single_arm, 0, 7], [tool, 7, 8]]
  action_split: [[single_arm, 0, 7], [tool, 7, 8]]
