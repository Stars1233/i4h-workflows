robot:
  type: star
  home_joint_pos_rad: [0.0, -0.569, 0.0, -2.0, 0.0, 2.037, 0.741, 0.04]
zenoh:
  camera_names: [room]
policy:
  stack: gr00t_n15
  health_port: 8773
  model_repo: nvidia/GR00T-N1.5-3B
  model_revision: null
  task_description: Move the STAR tool tip through sampled reach poses
  embodiment_tag: new_embodiment
  action_horizon: 16
  action_head_future_tokens: 0
  execution_steps: 16
  control_hz: 60.0
  data_config: star_singlecam
  denoising_steps: 4
  image_size: [256, 256]
