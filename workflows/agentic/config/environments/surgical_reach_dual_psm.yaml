robot:
  type: dual_psm
  home_joint_pos_rad: [0.01, 0.01, 0.07, 0.01, 0.01, 0.01, 0.09, 0.01, 0.01, 0.07, 0.01, 0.01, 0.01, 0.09]
zenoh:
  camera_names: [room]
policy:
  stack: gr00t_n15
  health_port: 8772
  model_repo: nvidia/GR00T-N1.5-3B
  model_revision: null
  task_description: Move both dVRK PSM tool tips through coordinated reach targets
  embodiment_tag: new_embodiment
  action_horizon: 16
  action_head_future_tokens: 0
  execution_steps: 16
  control_hz: 60.0
  data_config: dual_psm_singlecam
  denoising_steps: 4
  image_size: [256, 256]
  trt_engine_path: null
  infer_module: policy.surgical_baseline.infer.infer
  train_module: null
arena:
  bridge_port: 8871
  description: dVRK dual-PSM coordinated reach task.
  max_timesteps: 150
dataset:
  joint_space: raw
  state_obs_key: joint_pos
  action_names: [left.arm.pos, left.gripper.pos, right.arm.pos, right.gripper.pos]
  state_names: [left.joint_pos, right.joint_pos]
  state_split: [[left_arm, 0, 8], [right_arm, 8, 16]]
  action_split: [[left_arm, 0, 6], [left_gripper, 6, 7], [right_arm, 7, 13], [right_gripper, 13, 14]]
